<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping | Iniciar sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="access-page">
    <main class="access-wrapper">
        <section class="access-card">
            <div class="app-mark" aria-hidden="true">
                <span>Ping</span>
            </div>

            <div class="access-heading">
                <p class="tag">Mensajería moderna</p>
                <h1>Bienvenido a Ping</h1>
                <p>Ingresa con tu cuenta para continuar a tus chats y llamadas grupales.</p>
            </div>

            <form class="access-form" action="home.html">
                <div class="field-group">
                    <label for="correo">Correo electrónico</label>
                    <input id="correo" type="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="field-group">
                    <label for="clave">Contraseña</label>
                    <input id="clave" type="password" placeholder="********" required>
                </div>

                <button type="submit">Iniciar sesión</button>
            </form>

            <p class="register-note">
                ¿Aún no tienes cuenta?
                <a href="#">Crear cuenta</a>
            </p>
        </section>
    </main>
</body>
</html>
